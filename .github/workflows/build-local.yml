name: Build Android APK (Local Gradle)

on:
  workflow_dispatch:

jobs:
  build-android-local:
    name: Build APK via Expo + Gradle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Set environment variables
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Prebuild (generate Android native project)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Sign APK (with debug keystore)
        run: |
          cd android
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app/build/outputs/apk/release/kvs-edushield-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kvs-edushield-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "✅ APK built successfully!"
          echo "Download the APK from the Artifacts section of this workflow run."
          ls android/app/build/outputs/apk/release/ 2>/dev/null || echo "Check build logs above."
